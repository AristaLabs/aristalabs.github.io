<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — ARISTA LABS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://db.onlinewebfonts.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link href="https://db.onlinewebfonts.com/c/568e1a7e9b2ec90a53ab0cbced3584e7?family=SpaceX+PERSONAL+USE" rel="stylesheet" type="text/css" />
  <style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: radial-gradient(circle at top, #111827 0, #020617 55%, #020617 100%);
    --bg-solid: #020617;
    --accent-soft: #22d3ee;
    --text: #f9fafb;
    --muted: #9ca3af;
  }

  body {
    background: var(--bg);
    background-color: var(--bg-solid);
    background-attachment: fixed;
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
      sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at top, rgba(56, 189, 248, 0.10), transparent 55%),
      radial-gradient(circle at bottom, rgba(79, 70, 229, 0.22), transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    max-width: 1120px;
    margin: 0 auto;
    border-bottom: 1px solid transparent;
    background: linear-gradient(
      to bottom,
      rgba(15, 23, 42, 0.96),
      rgba(15, 23, 42, 0.78)
    );
    backdrop-filter: blur(22px);
  }

  .nav-logo {
    font-family: 'SpaceX PERSONAL USE', sans-serif;
    font-weight: 400;
    font-size: 18px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    -webkit-text-stroke: 0.35px currentColor;
    text-shadow:
      0 0 10px rgba(34, 211, 238, 0.8),
      0 0 20px rgba(34, 211, 238, 0.65),
      0 0 40px rgba(34, 211, 238, 0.5),
      1px 1px 0 rgba(0,0,0,0.4),
      2px 2px 0 rgba(0,0,0,0.3),
      3px 3px 0 rgba(0,0,0,0.25),
      4px 4px 0 rgba(0,0,0,0.2),
      5px 5px 4px rgba(0,0,0,0.5);
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-link {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid rgba(148, 163, 184, 0.35);
    background: radial-gradient(
      circle at top,
      rgba(15, 23, 42, 0.96),
      rgba(15, 23, 42, 0.8)
    );
    transition: color 0.2s ease, border-color 0.2s ease,
      background-color 0.2s ease;
  }

  .nav-link:hover {
    color: var(--accent-soft);
    border-color: var(--accent-soft);
  }

  .nav-link.active {
    color: var(--accent-soft);
    border-color: var(--accent-soft);
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 120px 24px 80px;
    position: relative;
    z-index: 1;
  }

  .contact-email {
    font-size: clamp(18px, 4.5vw, 28px);
    letter-spacing: 0.14em;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
    transition: color 0.18s ease, border-color 0.18s ease;
  }

  .contact-email:hover {
    color: var(--accent-soft);
    border-color: var(--accent-soft);
  }

  @media (max-width: 768px) {
    nav {
      padding: 12px 16px;
    }
  }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">ARISTA LABS</a>
    <div class="nav-links">
      <a href="mission.html" class="nav-link">Mission</a>
      <a href="guiding-principles.html" class="nav-link">Guiding Principles</a>
      <a href="index.html" class="nav-link">Product</a>
      <a href="contact.html" class="nav-link active">Contact</a>
    </div>
  </nav>

  <main>
    <a href="mailto:contact@aristalabs.com" class="contact-email">contact@aristalabs.com</a>
  </main>

</body>
</html>
