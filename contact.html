  <title>Contact — ARISTA LABS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: radial-gradient(circle at top, #111827 0, #020617 55%, #020617 100%);
    --bg-solid: #020617;
    --accent-soft: #22d3ee;
    --text: #f9fafb;
    --muted: #9ca3af;
  }

  body {
    background: var(--bg);
    background-color: var(--bg-solid);
    background-attachment: fixed;
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
      sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at top, rgba(56, 189, 248, 0.10), transparent 55%),
      radial-gradient(circle at bottom, rgba(79, 70, 229, 0.22), transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    max-width: 1120px;
    margin: 0 auto;
    border-bottom: 1px solid transparent;
    background: linear-gradient(
      to bottom,
      rgba(15, 23, 42, 0.96),
      rgba(15, 23, 42, 0.78)
    );
    backdrop-filter: blur(22px);
  }

  .nav-logo {
    font-family: 'SpaceX PERSONAL USE', sans-serif;
    font-weight: 400;
    font-size: 18px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    -webkit-text-stroke: 0.35px currentColor;
    text-shadow:
      0 0 10px rgba(34, 211, 238, 0.8),
      0 0 20px rgba(34, 211, 238, 0.65),
      0 0 40px rgba(34, 211, 238, 0.5),
      1px 1px 0 rgba(0,0,0,0.4),
      2px 2px 0 rgba(0,0,0,0.3),
      3px 3px 0 rgba(0,0,0,0.25),
      4px 4px 0 rgba(0,0,0,0.2),
      5px 5px 4px rgba(0,0,0,0.5);
  }

  .nav-logo span {
    color: var(--accent-soft);
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-link {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid rgba(148, 163, 184, 0.35);
    background: radial-gradient(
      circle at top,
      rgba(15, 23, 42, 0.96),
      rgba(15, 23, 42, 0.8)
    );
    transition: color 0.2s ease, border-color 0.2s ease,
      background-color 0.2s ease;
  }

  .nav-link:hover {
    color: var(--accent-soft);
    border-color: var(--accent-soft);
  }

  .nav-link.active {
    color: var(--accent-soft);
    border-color: var(--accent-soft);
  }

  .nav-toggle {
    display: none;
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    padding: 0;
    border: 1px solid rgba(148, 163, 184, 0.35);
    border-radius: 10px;
    background: radial-gradient(
      circle at top,
      rgba(15, 23, 42, 0.96),
      rgba(15, 23, 42, 0.8)
    );
    cursor: pointer;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 5px;
  }

  .nav-toggle span {
    display: block;
    width: 16px;
    height: 1.5px;
    background: var(--muted);
    transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
  }

  nav.nav-open .nav-toggle {
    border-color: var(--accent-soft);
  }

  nav.nav-open .nav-toggle span {
    background: var(--accent-soft);
  }

  nav.nav-open .nav-toggle span:nth-child(1) {
    transform: translateY(6.5px) rotate(45deg);
  }

  nav.nav-open .nav-toggle span:nth-child(2) {
    opacity: 0;
  }

  nav.nav-open .nav-toggle span:nth-child(3) {
    transform: translateY(-6.5px) rotate(-45deg);
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 120px 24px 80px;
    position: relative;
    z-index: 1;
  }

  .contact-email {
    font-size: clamp(18px, 4.5vw, 28px);
    letter-spacing: 0.14em;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
    transition: color 0.18s ease, border-color 0.18s ease;
  }

  .contact-email:hover {
    color: var(--accent-soft);
    border-color: var(--accent-soft);
  }

  @media (max-width: 768px) {
    nav {
      padding: 12px 16px;
      flex-wrap: wrap;
      row-gap: 4px;
    }

    .nav-toggle {
      display: flex;
    }

    .nav-links {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding: 8px 0 4px;
    }

    nav.nav-open .nav-links {
      display: flex;
    }

    .nav-link {
      font-size: 10px;
      padding: 10px 12px;
      text-align: center;
    }
  }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">ARISTA LABS</a>
    <button type="button" class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="site-nav">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="site-nav">
      <a href="index.html" class="nav-link">Mission</a>
      <a href="guiding-principles.html" class="nav-link">Guiding Principles</a>
      <a href="product.html" class="nav-link">Product</a>
      <a href="blog.html" class="nav-link">Blog</a>
      <a href="contact.html" class="nav-link active">Contact</a>
    </div>
  </nav>

  <main>
    <a href="mailto:contact@aristalabs.ai" class="contact-email plausible-event-name=Contact+Click">contact@aristalabs.ai</a>
  </main>

  <script>
    (function () {
      var nav = document.querySelector("nav");
      var toggle = document.querySelector(".nav-toggle");
      if (!nav || !toggle) return;
      toggle.addEventListener("click", function () {
        var open = nav.classList.toggle("nav-open");
        toggle.setAttribute("aria-expanded", open ? "true" : "false");
        toggle.setAttribute("aria-label", open ? "Close menu" : "Open menu");
      });
    })();
  </script>
</body>
