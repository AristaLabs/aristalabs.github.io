<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — ARISTA LABS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://db.onlinewebfonts.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link href="https://db.onlinewebfonts.com/c/568e1a7e9b2ec90a53ab0cbced3584e7?family=SpaceX+PERSONAL+USE" rel="stylesheet" type="text/css" />
  <style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: radial-gradient(circle at top, #111827 0, #020617 55%, #020617 100%);
    --bg-solid: #020617;
    --surface: rgba(15, 23, 42, 0.96);
    --surface-soft: rgba(15, 23, 42, 0.8);
    --accent: #4f46e5;
    --accent-soft: #22d3ee;
    --text: #f9fafb;
    --muted: #9ca3af;
    --border: rgba(148, 163, 184, 0.35);
    --shadow-soft: 0 24px 80px rgba(15, 23, 42, 0.95);
  }

  body {
    background: var(--bg);
    background-color: var(--bg-solid);
    background-attachment: fixed;
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
      sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at top, rgba(56, 189, 248, 0.10), transparent 55%),
      radial-gradient(circle at bottom, rgba(79, 70, 229, 0.22), transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    max-width: 1120px;
    margin: 0 auto;
    border-bottom: 1px solid transparent;
    background: linear-gradient(
      to bottom,
      rgba(15, 23, 42, 0.96),
      rgba(15, 23, 42, 0.78)
    );
    backdrop-filter: blur(22px);
  }

  .nav-logo {
    font-family: 'SpaceX PERSONAL USE', sans-serif;
    font-weight: 400;
    font-size: 18px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    -webkit-text-stroke: 0.35px currentColor;
    text-shadow:
      0 0 10px rgba(34, 211, 238, 0.8),
      0 0 20px rgba(34, 211, 238, 0.65),
      0 0 40px rgba(34, 211, 238, 0.5),
      1px 1px 0 rgba(0,0,0,0.4),
      2px 2px 0 rgba(0,0,0,0.3),
      3px 3px 0 rgba(0,0,0,0.25),
      4px 4px 0 rgba(0,0,0,0.2),
      5px 5px 4px rgba(0,0,0,0.5);
  }

  .nav-logo span {
    color: var(--accent-soft);
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-link {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid rgba(148, 163, 184, 0.35);
    background: radial-gradient(
      circle at top,
      rgba(15, 23, 42, 0.96),
      rgba(15, 23, 42, 0.8)
    );
    transition: color 0.2s ease, border-color 0.2s ease,
      background-color 0.2s ease;
  }

  .nav-link:hover {
    color: var(--accent-soft);
    border-color: var(--accent-soft);
  }

  .nav-link.active {
    color: var(--accent-soft);
    border-color: var(--accent-soft);
  }

  /* HERO */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 120px 24px 80px;
    z-index: 1;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    border-radius: 999px;
    filter: blur(90px);
    opacity: 0.9;
    pointer-events: none;
  }

  .orb-1 {
    width: 520px;
    height: 520px;
    background: radial-gradient(
      circle at 30% 20%,
      rgba(56, 189, 248, 0.55),
      transparent 60%
    );
    top: -140px;
    right: -140px;
    animation: drift 22s ease-in-out infinite alternate;
  }

  .orb-2 {
    width: 420px;
    height: 420px;
    background: radial-gradient(
      circle at 40% 80%,
      rgba(79, 70, 229, 0.6),
      transparent 60%
    );
    bottom: -160px;
    left: -60px;
    animation: drift 30s ease-in-out infinite alternate-reverse;
  }

  @keyframes drift {
    from {
      transform: translate3d(0, 0, 0);
    }
    to {
      transform: translate3d(8px, 10px, 0);
    }
  }

  .hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(
      circle at center,
      rgba(15, 23, 42, 0.8),
      transparent 68%
    );
    pointer-events: none;
    z-index: 2;
  }

  .hero-eyebrow {
    position: relative;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent-soft);
    margin-bottom: 24px;
    padding: 4px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: radial-gradient(
      circle at top,
      rgba(15, 23, 42, 0.96),
      rgba(15, 23, 42, 0.78)
    );
    display: inline-flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: fadeUp 1.3s 0.4s forwards;
    z-index: 3;
  }

  .hero-eyebrow::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: radial-gradient(
      circle at 30% 30%,
      var(--accent-soft),
      var(--accent)
    );
    flex-shrink: 0;
  }

  .hero-eyebrow--smeme {
    text-transform: none;
    letter-spacing: 0.05em;
    font-size: clamp(14px, 2.5vw, 21px);
    padding: 14px 26px;
    gap: 12px;
    margin-bottom: 28px;
    border-color: rgba(34, 211, 238, 0.5);
    background: radial-gradient(
      ellipse 120% 180% at 50% -20%,
      rgba(34, 211, 238, 0.22),
      rgba(79, 70, 229, 0.08) 42%,
      rgba(15, 23, 42, 0.94) 72%
    );
    box-shadow:
      0 0 28px rgba(34, 211, 238, 0.55),
      0 0 56px rgba(34, 211, 238, 0.38),
      0 0 96px rgba(79, 70, 229, 0.32),
      0 0 140px rgba(34, 211, 238, 0.22),
      0 0 180px rgba(79, 70, 229, 0.12),
      inset 0 1px 0 rgba(255, 255, 255, 0.1),
      inset 0 -1px 0 rgba(15, 23, 42, 0.6);
  }

  .hero-eyebrow--smeme::before {
    width: 10px;
    height: 10px;
    box-shadow:
      0 0 16px rgba(34, 211, 238, 1),
      0 0 32px rgba(34, 211, 238, 0.65);
  }

  .hero-smeme-badge {
    font-family: 'SpaceX PERSONAL USE', sans-serif;
    font-weight: 400;
    font-size: clamp(15px, 2.3vw, 23px);
    letter-spacing: 0.12em;
    text-transform: none;
    color: var(--muted);
    text-decoration: none;
    -webkit-text-stroke: 0.35px currentColor;
    text-shadow:
      0 0 10px rgba(34, 211, 238, 0.8),
      0 0 20px rgba(34, 211, 238, 0.65),
      0 0 40px rgba(34, 211, 238, 0.5),
      1px 1px 0 rgba(0,0,0,0.4),
      2px 2px 0 rgba(0,0,0,0.3),
      3px 3px 0 rgba(0,0,0,0.25),
      4px 4px 0 rgba(0,0,0,0.2),
      5px 5px 4px rgba(0,0,0,0.5);
    transition: color 0.2s ease;
  }

  .hero-smeme-badge span {
    color: var(--accent-soft);
  }

  .hero-smeme-badge:hover {
    color: var(--text);
  }

  .hero-headline {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display",
      sans-serif;
    font-weight: 700;
    font-size: clamp(40px, 7vw, 80px);
    line-height: 1.03;
    letter-spacing: -0.04em;
    max-width: 780px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 1.3s 0.6s forwards;
    z-index: 3;
  }

  .hero-headline em {
    font-style: normal;
    background: radial-gradient(circle at 0% 0%, #22d3ee, #a855f7);
    -webkit-background-clip: text;
    color: transparent;
    -webkit-text-stroke: 0;
  }

  .hero-sub {
    margin-top: 28px;
    font-size: 14px;
    line-height: 1.9;
    color: var(--muted);
    max-width: 720px;
    text-align: center;
    margin-inline: auto;
    padding: 18px 22px;
    border-radius: 24px;
    background: radial-gradient(
      circle at top left,
      rgba(15, 23, 42, 0.98),
      rgba(15, 23, 42, 0.86)
    );
    border: 1px solid rgba(148, 163, 184, 0.35);
    box-shadow: var(--shadow-soft);
    opacity: 0;
    animation: fadeUp 1.3s 0.9s forwards;
    z-index: 3;
  }

  .hero-footnote {
    margin-top: 16px;
    font-size: 12px;
    line-height: 1.7;
    color: var(--muted);
    max-width: 720px;
    text-align: center;
    margin-inline: auto;
    opacity: 0;
    animation: fadeUp 1.3s 1.1s forwards;
    z-index: 3;
  }

  /* FOOTER */
  footer {
    position: relative;
    z-index: 3;
    padding: 24px 24px 32px;
    border-top: 1px solid rgba(15, 23, 42, 0.9);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
  }

  .footer-logo {
    font-family: 'SpaceX PERSONAL USE', sans-serif;
    font-weight: 400;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    -webkit-text-stroke: 0.3px currentColor;
    text-shadow:
      0 0 8px rgba(34, 211, 238, 0.7),
      0 0 16px rgba(34, 211, 238, 0.55),
      0 0 28px rgba(34, 211, 238, 0.45),
      1px 1px 0 rgba(0,0,0,0.4),
      2px 2px 0 rgba(0,0,0,0.3),
      3px 3px 0 rgba(0,0,0,0.25),
      4px 4px 2px rgba(0,0,0,0.5);
  }

  .footer-logo span {
    color: var(--accent-soft);
  }

  .footer-copy {
    font-size: 11px;
    letter-spacing: 0.08em;
  }

  .footer-email {
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    padding-bottom: 1px;
    transition: color 0.18s ease, border-color 0.18s ease;
  }

  .footer-email:hover {
    color: var(--accent-soft);
    border-color: var(--accent-soft);
  }

  /* Animations / utilities */
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(28px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 768px) {
    nav {
      padding: 12px 16px;
    }

    .nav-links {
      gap: 6px;
    }

    .nav-link {
      font-size: 10px;
      padding: 5px 10px;
    }

    .hero {
      padding: 112px 16px 56px;
    }

    .hero-sub {
      padding: 16px 18px;
      border-radius: 20px;
    }

    footer {
      padding: 20px 16px 28px;
      text-align: center;
    }
  }
</style>
</head>
